name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

# tree-sitter requires CGO, so each target is built natively on its own runner
# instead of cross-compiling.
jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-13
            goos: darwin
            goarch: amd64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        shell: bash
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          CGO_ENABLED=1 go build -trimpath \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/gatt-${{ matrix.goos }}-${{ matrix.goarch }}${ext}" ./cmd/gatt
      - uses: actions/upload-artifact@v4
        with:
          name: gatt-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum gatt-* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gatt-*
            dist/checksums.txt
          generate_release_notes: true
